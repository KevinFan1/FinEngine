[alembic]
script_location = alembic
prepend_sys_path = .

# NOTE: sqlalchemy.url is overridden in env.py from app settings
# This is only a fallback for offline mode
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/finengine

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
